<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Task Manager</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">✅</div>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Login to manage your tasks</p>

    <div id="msg" class="msg hidden"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary btn-full" onclick="login()">Login</button>
    <p class="auth-link">No account? <a href="/register">Register here</a></p>
  </div>

  <script>
    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const msgEl    = document.getElementById('msg');

      if (!email || !password) {
        showMsg(msgEl, 'Please fill in all fields.', 'error');
        return;
      }

      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.ok) {
        showMsg(msgEl, '✅ ' + data.message, 'success');
        setTimeout(() => window.location.href = '/dashboard', 800);
      } else {
        showMsg(msgEl, '❌ ' + data.error, 'error');
      }
    }

    function showMsg(el, text, type) {
      el.textContent = text;
      el.className   = 'msg ' + type;
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
