<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – Task Manager</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <!-- Socket.IO CDN -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <div class="nav-brand">✅ TaskManager</div>
    <div class="nav-right">
      <span class="nav-user">👤 {{ username }}</span>
      <span id="ws-status" class="ws-badge disconnected">⚡ Connecting…</span>
      <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- ── Notification Toast ── -->
  <div id="toast" class="toast hidden"></div>

  <div class="container">

    <!-- ── Analytics Cards ── -->
    <section class="section">
      <h3 class="section-title">📊 Analytics Overview</h3>
      <div class="analytics-grid" id="analyticsGrid">
        <div class="stat-card blue">
          <div class="stat-value" id="statTotal">–</div>
          <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card green">
          <div class="stat-value" id="statCompleted">–</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card orange">
          <div class="stat-value" id="statPending">–</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card purple">
          <div class="stat-value" id="statInProgress">–</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card teal">
          <div class="stat-value" id="statPercent">–</div>
          <div class="stat-label">Completion %</div>
        </div>
        <div class="stat-card red">
          <div class="stat-value" id="statHigh">–</div>
          <div class="stat-label">High Priority</div>
        </div>
      </div>
    </section>

    <!-- ── Add Task Form ── -->
    <section class="section">
      <h3 class="section-title">➕ Add New Task</h3>
      <div class="card">
        <div class="form-row">
          <div class="form-group flex-2">
            <label>Title *</label>
            <input type="text" id="taskTitle" placeholder="Task title…" />
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select id="taskPriority">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="taskStatus">
              <option value="pending" selected>⏳ Pending</option>
              <option value="in_progress">🔄 In Progress</option>
              <option value="completed">✅ Completed</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="taskDesc" rows="2" placeholder="Optional description…"></textarea>
        </div>
        <button class="btn btn-primary" onclick="addTask()">Add Task</button>
      </div>
    </section>

    <!-- ── Task List ── -->
    <section class="section">
      <div class="section-header">
        <h3 class="section-title">📋 My Tasks</h3>
        <input type="text" id="searchInput" placeholder="🔍 Search tasks…" class="search-input"
               oninput="filterTasks()" />
      </div>
      <div id="taskList" class="task-list">
        <div class="loading">Loading tasks…</div>
      </div>
    </section>

  </div><!-- /container -->

  <!-- ── Edit Modal ── -->
  <div id="editModal" class="modal hidden">
    <div class="modal-box">
      <h3>✏️ Edit Task</h3>
      <input type="hidden" id="editId" />
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="editTitle" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="editDesc" rows="2"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Priority</label>
          <select id="editPriority">
            <option value="low">🟢 Low</option>
            <option value="medium">🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="editStatus">
            <option value="pending">⏳ Pending</option>
            <option value="in_progress">🔄 In Progress</option>
            <option value="completed">✅ Completed</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveEdit()">Save</button>
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
