<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Task Manager</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">✅</div>
    <h2>Create Account</h2>
    <p class="auth-sub">Start managing your tasks today</p>

    <div id="msg" class="msg hidden"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="johndoe" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters" />
    </div>

    <button class="btn btn-primary btn-full" onclick="register()">Register</button>
    <p class="auth-link">Already have an account? <a href="/login">Login here</a></p>
  </div>

  <script>
    async function register() {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const msgEl    = document.getElementById('msg');

      if (!username || !email || !password) {
        showMsg(msgEl, 'Please fill in all fields.', 'error');
        return;
      }
      if (password.length < 6) {
        showMsg(msgEl, 'Password must be at least 6 characters.', 'error');
        return;
      }

      const res  = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();

      if (res.ok) {
        showMsg(msgEl, '✅ ' + data.message, 'success');
        setTimeout(() => window.location.href = '/login', 1200);
      } else {
        showMsg(msgEl, '❌ ' + data.error, 'error');
      }
    }

    function showMsg(el, text, type) {
      el.textContent = text;
      el.className   = 'msg ' + type;
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
  </script>
</body>
</html>
